# ~/.config/picom/picom.conf

# ── Backend ──────────────────────────────────────────
backend = "glx";   # use "xrender" if glx causes issues

# ── VSync ────────────────────────────────────────────
vsync = true;

# ── Shadows ──────────────────────────────────────────
shadow = true;
shadow-opacity = 0.95;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;

# ── Fading ───────────────────────────────────────────
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

# ── Blur ─────────────────────────────────────────────
blur-background = true;
blur-background-fixed = true;
blur-method = "dual_kawase";   # modern replacement; use "gaussian" if unsupported
blur-strength = 5;

# ── Corners ──────────────────────────────────────────
detect-rounded-corners = true;
corner-radius = 8;   # set to 0 to disable rounding globally

# ── Window Rules (new universal style) ───────────────
rules: (
  {
    # Inactive windows: replaces -i 0.88
    match = "!focused";
    opacity = 0.88;
  },
  {
    # Disable blur/shadow on desktop and docks
    match = "window_type = 'dock' || window_type = 'desktop'";
    blur-background = false;
    shadow = false;
    corner-radius = 0;
  },
  {
    # Fullscreen windows: no dim, no shadow, no corners
    match = "fullscreen";
    opacity = 1.0;
    shadow = false;
    corner-radius = 0;
  }
);
